name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1" # weekly, catches newly-published rules
  workflow_call: # so the release workflow can require it before pushing images

permissions:
  actions: read # read workflow run metadata (required on private repos)
  contents: read
  security-events: write # upload results to the Security tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          # Broader query suite than the default; drop to "security-and-quality"
          # or remove for the lighter default set.
          queries: security-extended
      # Python and JS/TS need no build step for CodeQL.
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
