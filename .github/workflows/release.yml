name: Release

# Tagging a version is the trigger. The version comes straight from the git tag:
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write # push to GitHub Container Registry (ghcr.io)
  security-events: write # required by the CodeQL reusable workflow

jobs:
  # Re-run the exact CI + CodeQL gates on the tagged commit. The image build
  # below `needs` both, so nothing is published unless they succeed.
  ci:
    uses: ./.github/workflows/ci.yml
  codeql:
    uses: ./.github/workflows/codeql.yml

  build-push:
    needs: [ci, codeql]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Backend build context is the repo root so the analyzer scripts copy in.
          - name: backend
            context: .
            dockerfile: web/backend/Dockerfile
          - name: frontend
            context: web/frontend
            dockerfile: web/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag: 1.2.3, 1.2, latest (auto), sha-….
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
