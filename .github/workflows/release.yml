name: Release

# Tagging a version is the trigger. The version comes straight from the git tag:
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write # push to GitHub Container Registry (ghcr.io)

jobs:
  # Re-run the test suite on the tagged commit. CodeQL is NOT re-run here — it
  # already gates every push to main and every PR (and re-scanning the same
  # commit on a tag ref only adds a flaky duplicate SARIF upload). The image
  # build below `needs` ci, so nothing is published unless the tests pass.
  ci:
    uses: ./.github/workflows/ci.yml

  build-push:
    needs: [ci]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Backend build context is the repo root so the analyzer scripts copy in.
          - name: backend
            context: .
            dockerfile: web/backend/Dockerfile
          - name: frontend
            context: web/frontend
            dockerfile: web/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag: 1.2.3, 1.2, latest (auto), sha-….
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
