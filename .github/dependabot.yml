# Dependabot configuration.
# Covers every dependency surface in the repo: the analyzer's Python deps, the
# web backend's Python deps, both npm projects (frontend + e2e), both
# Dockerfiles, and GitHub Actions.
#
# Each ecosystem/directory uses a single catch-all group (no update-types
# filter) so ALL updates for that directory — including majors — arrive in ONE
# pull request. This keeps multiple bumps from racing on the same manifest /
# lockfile and conflicting with each other.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # ── Python: analyzer scripts (repo root requirements.txt) ──────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      analyzer-python:
        patterns: ["*"]

  # ── Python: web backend (FastAPI + analyzer runtime deps) ──────────────
  - package-ecosystem: "pip"
    directory: "/web/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "backend"
    groups:
      backend-python:
        patterns: ["*"]

  # ── npm: React frontend ────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/web/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    groups:
      frontend-npm:
        patterns: ["*"]

  # ── npm: Playwright E2E suite ──────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/web/e2e"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "e2e"
    groups:
      e2e-npm:
        patterns: ["*"]

  # ── Docker: backend image ──────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/web/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      backend-docker:
        patterns: ["*"]

  # ── Docker: frontend image (nginx + node build stage) ──────────────────
  - package-ecosystem: "docker"
    directory: "/web/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      frontend-docker:
        patterns: ["*"]

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns: ["*"]
