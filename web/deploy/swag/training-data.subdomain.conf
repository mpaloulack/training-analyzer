# SWAG reverse-proxy config for the Training Analyzer web app.
# Place this file in SWAG at:  /config/nginx/proxy-confs/training-data.subdomain.conf
# Then restart SWAG:           docker restart swag
#
# Requirements:
#  - The "frontend" container and SWAG must share a Docker network so the name
#    `frontend` resolves (attach both to a shared external network, e.g. proxynet).
#  - The frontend container listens on HTTP :8080 and proxies /api to backend.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name training-data.*;

    include /config/nginx/ssl.conf;

    # The form payload is tiny JSON; allow a small body, no big uploads.
    client_max_body_size 1m;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app frontend;     # container name / network alias
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # Stream the analysis progress (NDJSON) to the client instead of
        # buffering the whole response — mirrors the app's own nginx.
        # NB: proxy.conf already sets proxy_read_timeout (240s) — don't redefine
        # it here or nginx errors with "duplicate directive". Progress streams
        # continuously so each line resets the read timer; 240s is plenty.
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
